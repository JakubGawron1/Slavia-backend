# E-3 — utrzymanie Hugging Face Space w stanie „ciepłym” (mniej cold startów).
# Wymagane w GitHub (Settings → Secrets and variables → Actions):
#   Secret HF_API_BASE_URL — bazowy URL Space API, np. https://koliber-cks-slavia.hf.space
#   (bez końcowego slasha; ping: GET /api/system/ping)
# Gdy sekret nie jest ustawiony, job jest pomijany.

name: Keep warm (Hugging Face)

on:
  schedule:
    # Co 5 min w godzinach 6–22 UTC (dzienne okno aktywności klubu).
    - cron: '*/5 6-22 * * *'
  workflow_dispatch:

jobs:
  ping:
    if: ${{ secrets.HF_API_BASE_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: GET /api/system/ping
        env:
          HF_API_BASE_URL: ${{ secrets.HF_API_BASE_URL }}
        run: |
          set -euo pipefail
          base="${HF_API_BASE_URL%/}"
          echo "Pinging ${base}/api/system/ping"
          curl -fsS --max-time 30 --retry 2 --retry-delay 5 \
            "${base}/api/system/ping"
