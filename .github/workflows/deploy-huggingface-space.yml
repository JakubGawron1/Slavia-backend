# Synchronizuje repozytorium GitHub → Hugging Face Docker Space po pushu na main.
# Wymagane w GitHub (Settings → Secrets and variables → Actions):
#   Secret HF_TOKEN — token HF z uprawnieniem write
#   Secret lub Variable HF_SPACE_REPO — np. koliber/cks-slavia (owner/nazwa-space)

name: Deploy Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.dockerignore'
      - 'build.rs'
      - 'deploy/huggingface/**'
      - '.github/workflows/deploy-huggingface-space.yml'
  workflow_dispatch:

concurrency:
  group: hf-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate GitHub configuration
        env:
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO || vars.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HF_TOKEN}" ]]; then
            echo "::error::Brak sekretu HF_TOKEN. Dodaj token z https://huggingface.co/settings/tokens"
            exit 1
          fi
          if [[ -z "${HF_SPACE_REPO}" ]]; then
            echo "::error::Brak HF_SPACE_REPO (secret lub variable). Wartość: owner/nazwa-space, np. koliber/cks-slavia"
            exit 1
          fi

      - name: Prepare Space README (YAML frontmatter dla Docker SDK)
        run: cp deploy/huggingface/README.md README.md

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'deploy/huggingface/**'

      - name: Sync to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO || vars.HF_SPACE_REPO }}
        run: |
          set -euo pipefail

          # huggingface_hub>=1.2 — `hf repos` (stare `hf repo` jest deprecated).
          HF_CLI=(uvx --with 'huggingface_hub>=1.2.0' hf)

          is_retryable_hf_error() {
            local code=$1
            # 402/403/404 nie są przejściowe — retry tylko 429 i 5xx.
            case "${code}" in
              402|403|404|422) return 1 ;;
              *) return 0 ;;
            esac
          }

          retry_hf() {
            local max_attempts=6
            local attempt=1
            local wait_s=45
            while true; do
              if "${@}"; then
                return 0
              fi
              local exit_code=$?
              if ! is_retryable_hf_error "${exit_code}"; then
                return "${exit_code}"
              fi
              if [[ ${attempt} -ge ${max_attempts} ]]; then
                echo "::error::HF command failed after ${max_attempts} attempts (exit ${exit_code}): $*"
                return "${exit_code}"
              fi
              echo "HF rate limit or transient error — retry ${attempt}/${max_attempts} in ${wait_s}s..."
              sleep "${wait_s}"
              attempt=$((attempt + 1))
              wait_s=$((wait_s + 30))
              if [[ ${wait_s} -gt 300 ]]; then
                wait_s=300
              fi
            done
          }

          echo "Checking Space exists: ${HF_SPACE_REPO}"
          if ! "${HF_CLI[@]}" repo info "${HF_SPACE_REPO}" --repo-type space >/dev/null 2>&1; then
            echo "::error::Space '${HF_SPACE_REPO}' not found on Hugging Face."
            echo "::error::Create it once in the HF UI: https://huggingface.co/new-space → SDK: Docker (same owner/name as HF_SPACE_REPO)."
            echo "::error::Docker Spaces cannot be auto-created from CI on free accounts (402 Payment Required without HF PRO). After creation, re-run this workflow."
            exit 1
          fi
          echo "Space found — uploading files (no repo create from CI)."

          file_count=$(find . -type f ! -path './.git/*' ! -path './.github/*' | wc -l | tr -d ' ')
          if [[ "${file_count}" -eq 0 ]]; then
            echo "::error::No files to upload"
            exit 1
          fi

          echo "Uploading ${file_count} files to ${HF_SPACE_REPO}..."
          retry_hf "${HF_CLI[@]}" upload "${HF_SPACE_REPO}" . \
            --repo-type space \
            --exclude=".git*" \
            --exclude=".github*" \
            --delete="*" \
            --commit-message="Sync from GitHub (${GITHUB_SHA::7})"

          echo "Space: https://huggingface.co/spaces/${HF_SPACE_REPO}"

      - name: Summary
        if: success()
        env:
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO || vars.HF_SPACE_REPO }}
        run: |
          {
            echo "### Hugging Face Space"
            echo ""
            echo "Space: https://huggingface.co/spaces/${HF_SPACE_REPO}"
            echo ""
            echo "API (po zbudowaniu kontenera): https://${HF_SPACE_REPO//\//-}.hf.space"
            echo ""
            echo "Commit: \`${GITHUB_SHA::7}\`"
          } >> "$GITHUB_STEP_SUMMARY"
