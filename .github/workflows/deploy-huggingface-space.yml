# Synchronizuje repozytorium GitHub → Hugging Face Docker Space po pushu na main.
# Deploy przez git push (nie `hf upload` — od 2026 HF zwraca 402 na repos/create dla Docker Space bez PRO).
#
# Wymagane w GitHub (Settings → Secrets and variables → Actions):
#   Secret HF_TOKEN — token HF z uprawnieniem write
#   Secret lub Variable HF_SPACE_REPO — np. koliber/cks-slavia (owner/nazwa-space)

name: Deploy Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.dockerignore'
      - 'build.rs'
      - 'deploy/huggingface/**'
      - '.github/workflows/deploy-huggingface-space.yml'
  workflow_dispatch:

concurrency:
  group: hf-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate GitHub configuration
        env:
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO || vars.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HF_TOKEN}" ]]; then
            echo "::error::Brak sekretu HF_TOKEN. Dodaj token z https://huggingface.co/settings/tokens"
            exit 1
          fi
          if [[ -z "${HF_SPACE_REPO}" ]]; then
            echo "::error::Brak HF_SPACE_REPO (secret lub variable). Wartość: owner/nazwa-space, np. koliber/cks-slavia"
            exit 1
          fi

      - name: Prepare Space README (YAML frontmatter dla Docker SDK)
        run: cp deploy/huggingface/README.md README.md

      - name: Sync to Hugging Face Space (git push)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO || vars.HF_SPACE_REPO }}
        run: |
          set -euo pipefail

          normalize_space_repo() {
            local raw="${1}"
            raw="${raw#"${raw%%[![:space:]]*}"}"
            raw="${raw%"${raw##*[![:space:]]}"}"
            raw="${raw#spaces/}"
            raw="${raw#/}"
            raw="${raw%/}"
            if [[ ! "${raw}" =~ ^[^/[:space:]]+/[^/[:space:]]+$ ]]; then
              echo "::error::HF_SPACE_REPO must be owner/space-name (e.g. koliber/cks-slavia), got: '${raw}'"
              exit 1
            fi
            printf '%s' "${raw}"
          }

          HF_SPACE_REPO="$(normalize_space_repo "${HF_SPACE_REPO}")"
          HF_OWNER="${HF_SPACE_REPO%%/*}"
          echo "HF Space target: ${HF_SPACE_REPO}"

          HF_GIT_URL="https://${HF_OWNER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}"

          echo "Checking Space git remote..."
          if ! git ls-remote "${HF_GIT_URL}" HEAD >/dev/null 2>&1; then
            echo "::error::Cannot access Space git repo for '${HF_SPACE_REPO}'."
            echo "::error::Create it once: https://huggingface.co/new-space → SDK Docker → owner/name matching HF_SPACE_REPO."
            echo "::error::Ensure HF_TOKEN has write access to this Space."
            exit 1
          fi

          WORK="$(mktemp -d)"
          git clone "${HF_GIT_URL}" "${WORK}/space"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            "${GITHUB_WORKSPACE}/" "${WORK}/space/"

          cd "${WORK}/space"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add -A
          if git diff --staged --quiet; then
            echo "No file changes — skipping commit."
          else
            git commit -m "Sync from GitHub (${GITHUB_SHA::7})"
            git push origin HEAD:main
          fi

          echo "Space: https://huggingface.co/spaces/${HF_SPACE_REPO}"

      - name: Summary
        if: success()
        env:
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO || vars.HF_SPACE_REPO }}
        run: |
          {
            echo "### Hugging Face Space"
            echo ""
            echo "Space: https://huggingface.co/spaces/${HF_SPACE_REPO}"
            echo ""
            echo "API (po zbudowaniu kontenera): https://${HF_SPACE_REPO//\//-}.hf.space"
            echo ""
            echo "Commit: \`${GITHUB_SHA::7}\`"
          } >> "$GITHUB_STEP_SUMMARY"
