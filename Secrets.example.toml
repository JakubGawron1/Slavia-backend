# tryb: "turso" (domyślnie) albo "local" dla SQLite w pliku (bez sieci)
# DATABASE_MODE = "turso"
# DATABASE_LOCAL_PATH = ".local/slavia.db"

TURSO_DATABASE_URL = "libsql://your-db.turso.io"
TURSO_AUTH_TOKEN = "your_turso_token"
JWT_SECRET = "change_me_for_production"
CLOUDINARY_CLOUD_NAME = "your_cloud_name"
CLOUDINARY_API_KEY = "your_cloudinary_api_key"
CLOUDINARY_API_SECRET = "your_cloudinary_api_secret"
# Required for unsigned upload (recommended for Render/Leapcell to avoid timestamp drift issues)
# Make sure this preset is set to "Unsigned" in Cloudinary settings.
CLOUDINARY_UPLOAD_PRESET = "your_unsigned_upload_preset"

# Slavia-cms — galeria / blog / ogłoszenia (upload przez backend, PAT z scope `repo`)
# SLAVIA_CMS_REPO = "JakubGawron1/Slavia-cms"
# SLAVIA_CMS_BRANCH = "main"
# SLAVIA_CMS_MEDIA_ROOT = "media"
# GITHUB_TOKEN = "ghp_..."
